<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambient Lens — Audio Visualizer</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- TensorFlow.js and COCO-SSD -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
    <!-- Tone.js for synthesis -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>
    <div id="loading-screen">
        <div class="loader"></div>
        <p>Loading AI Models...</p>
        <p class="sub">This may take 10-20 seconds</p>
    </div>

    <div id="start-screen">
        <div class="content">
            <h1>🎵 Ambient Lens</h1>
            <p>Point your camera around the room. Colors and objects become sound.</p>
            <button id="start-btn">Enter Experience</button>
            <p class="hint">Requires webcam access • Audio will play</p>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <!-- Video feed (hidden, used for processing) -->
        <video id="webcam" autoplay playsinline muted></video>
        
        <!-- Main visualizer canvas -->
        <canvas id="visualizer"></canvas>
        
        <!-- Detection overlay -->
        <canvas id="detection-overlay"></canvas>

        <!-- UI Overlay -->
        <div id="ui-layer">
            <div id="top-bar">
                <h2>Ambient Lens</h2>
                <div id="status">
                    <span id="fps">0 FPS</span>
                    <span id="objects-count">0 objects</span>
                </div>
            </div>

            <div id="scene-info">
                <div id="color-palette"></div>
                <div id="detected-objects"></div>
            </div>

            <div id="controls">
                <button id="mute-btn">🔊</button>
                <button id="record-btn">⏺ Record</button>
                <button id="fullscreen-btn">⛶</button>
            </div>

            <div id="audio-params">
                <div class="param">
                    <label>Drone</label>
                    <div class="bar"><div id="drone-bar"></div></div>
                </div>
                <div class="param">
                    <label>Beat</label>
                    <div class="bar"><div id="beat-bar"></div></div>
                </div>
                <div class="param">
                    <label>Modulation</label>
                    <div class="bar"><div id="mod-bar"></div></div>
                </div>
            </div>
        </div>

        <!-- Tap hint -->
        <div id="tap-hint" class="hidden">Tap any detected object to trigger its sound</div>
    </div>

    <!-- Scripts -->
    <script src="js/audioEngine.js"></script>
    <script src="js/visualEngine.js"></script>
    <script src="js/objectDetector.js"></script>
    <script src="js/sceneAnalyzer.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
